---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/api/v1/matches":
    get:
      summary: list matches
      tags:
      - Matches
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    home_team_id:
                      type: integer
                    away_team_id:
                      type: integer
                    match_date:
                      type: string
                      format: date_time
                    stadium:
                      type: string
                    created_at:
                      type: string
                      format: date_time
                    updated_at:
                      type: string
                      format: date_time
                  required:
                  - id
                  - home_team_id
                  - away_team_id
    post:
      summary: create match
      tags:
      - Matches
      parameters: []
      responses:
        '201':
          description: created
        '422':
          description: unprocessable entity
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                match:
                  type: object
                  properties:
                    home_team_id:
                      type: integer
                    away_team_id:
                      type: integer
                    match_date:
                      type: string
                      format: date_time
                    stadium:
                      type: string
                  required:
                  - home_team_id
                  - away_team_id
              required:
              - match
  "/api/v1/matches/{id}":
    parameters:
    - name: id
      in: path
      description: id
      required: true
      schema:
        type: string
    get:
      summary: show match
      tags:
      - Matches
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  home_team_id:
                    type: integer
                  away_team_id:
                    type: integer
                  match_date:
                    type: string
                    format: date_time
                  stadium:
                    type: string
                  created_at:
                    type: string
                    format: date_time
                  updated_at:
                    type: string
                    format: date_time
                required:
                - id
                - home_team_id
                - away_team_id
        '404':
          description: not found
    patch:
      summary: update match
      tags:
      - Matches
      parameters:
      - name: id
        in: path
        description: id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: successful
        '422':
          description: unprocessable entity
        '404':
          description: not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                match:
                  type: object
                  properties:
                    stadium:
                      type: string
              required:
              - match
    put:
      summary: update match
      tags:
      - Matches
      parameters:
      - name: id
        in: path
        description: id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: successful
        '422':
          description: unprocessable entity
        '404':
          description: not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                match:
                  type: object
                  properties:
                    home_team_id:
                      type: integer
                    away_team_id:
                      type: integer
                    match_date:
                      type: string
                      format: date_time
                    stadium:
                      type: string
                  required:
                  - home_team_id
                  - away_team_id
              required:
              - match
    delete:
      summary: delete match
      tags:
      - Matches
      parameters:
      - name: id
        in: path
        description: id
        required: true
        schema:
          type: string
      responses:
        '204':
          description: no content
        '404':
          description: not found
servers:
- url: http://{defaultHost}
  variables:
    defaultHost:
      default: 127.0.0.1:3000
